services:
  - type: web
    name: securesys-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true  # Render auto-generates a secure key
      - key: ENCRYPTION_KEY
        value: SecureSys2024EncryptKey!!ABCDE  # Replace with actual 32-char key
      - key: FLASK_DEBUG
        value: false
